services:
  train:
    build:
      context: .
      dockerfile: Dockerfile
    image: ciglspc:latest
    devices:
      - nvidia.com/gpu=all
    volumes:
      - ./data:/app/data
      - ./results:/app/results
      - ./outputs:/app/outputs
    entrypoint: [".venv/bin/python", "main.py"]
    command: ["$HYDRA_ARGS"]
